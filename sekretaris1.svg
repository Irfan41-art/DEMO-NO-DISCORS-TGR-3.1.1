<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <linearGradient id="sekretarisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="sekretarisBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded hex-shield or soft polygon background -->
  <rect x="15" y="15" width="210" height="210" rx="36" fill="url(#sekretarisBgGrad)" stroke="url(#sekretarisGrad)" stroke-width="3" opacity="0.9" />
  
  <!-- Main clipboard/document icon -->
  <g transform="translate(60, 50)">
    <!-- Clipboard body -->
    <rect x="10" y="30" width="100" height="120" rx="10" fill="none" stroke="url(#sekretarisGrad)" stroke-width="6" />
    <!-- Clipboard header clip -->
    <path d="M 40 30 L 40 20 A 10 10 0 0 1 80 20 L 80 30" fill="none" stroke="url(#sekretarisGrad)" stroke-width="6" stroke-linecap="round" />
    <!-- Document lines -->
    <line x1="30" y1="65" x2="90" y2="65" stroke="url(#sekretarisGrad)" stroke-width="6" stroke-linecap="round" />
    <line x1="30" y1="90" x2="90" y2="90" stroke="url(#sekretarisGrad)" stroke-width="6" stroke-linecap="round" />
    <line x1="30" y1="115" x2="70" y2="115" stroke="url(#sekretarisGrad)" stroke-width="6" stroke-linecap="round" />
    <!-- Gear/timer accessory on the side -->
    <circle cx="105" cy="125" r="22" fill="#0f172a" stroke="url(#sekretarisGrad)" stroke-width="4" filter="url(#glow)" />
    <!-- Clock hands inside the accessory circle -->
    <path d="M 105 113 L 105 125 L 115 125" fill="none" stroke="url(#sekretarisGrad)" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
