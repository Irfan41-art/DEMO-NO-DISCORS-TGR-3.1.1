<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <linearGradient id="dewanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="dewanBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded hex-shield or soft polygon background -->
  <rect x="15" y="15" width="210" height="210" rx="36" fill="url(#dewanBgGrad)" stroke="url(#dewanGrad)" stroke-width="3" opacity="0.9" />
  
  <!-- Main dewan gavel & shield icon -->
  <g transform="translate(60, 50)">
    <!-- Elegant Shield in background -->
    <path d="M 20 20 L 100 20 C 100 80 80 120 60 140 C 40 120 20 80 20 20 Z" fill="none" stroke="url(#dewanGrad)" stroke-width="6" stroke-linejoin="round" />
    <!-- Gavel / Hammer of justice -->
    <g transform="rotate(30 60 70)">
      <!-- Gavel handle -->
      <line x1="60" y1="10" x2="60" y2="100" stroke="url(#dewanGrad)" stroke-width="6" stroke-linecap="round" />
      <!-- Gavel head -->
      <rect x="30" y="20" width="60" height="25" rx="5" fill="#0f172a" stroke="url(#dewanGrad)" stroke-width="5" />
      <!-- Ridge lines on gavel head -->
      <line x1="40" y1="20" x2="40" y2="45" stroke="url(#dewanGrad)" stroke-width="2" />
      <line x1="80" y1="20" x2="80" y2="45" stroke="url(#dewanGrad)" stroke-width="2" />
    </g>
    <!-- Gavel base / sound block -->
    <path d="M 35 115 L 85 115" stroke="url(#dewanGrad)" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
