# Alur kerja otomatis untuk menyebarkan aplikasi ke GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"] # Jalankan otomatis saat Anda push ke cabang main atau master

  # Izinkan menjalankan alur kerja ini secara manual dari tab Actions di GitHub
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Gunakan Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependensi
        run: npm ci || npm install

      - name: Build Aplikasi (Vite)
        run: npm run build

      - name: Konfigurasi GitHub Pages
        uses: actions/configure-pages@v4

      - name: Unggah Artefak Hasil Build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Folder output hasil build dari Vite

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
