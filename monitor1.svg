<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <linearGradient id="monitorBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#451a03" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <!-- Rounded hex-shield or soft polygon background -->
  <rect x="15" y="15" width="210" height="210" rx="36" fill="url(#monitorBgGrad)" stroke="url(#monitorGrad)" stroke-width="3" opacity="0.9" />
  
  <!-- Main Display screen icon -->
  <g transform="translate(50, 55)">
    <!-- Screen Outer Frame -->
    <rect x="10" y="10" width="120" height="85" rx="12" fill="none" stroke="url(#monitorGrad)" stroke-width="6" />
    <!-- Screen Stand neck -->
    <path d="M 55 95 L 50 115 L 90 115 L 85 95 Z" fill="none" stroke="url(#monitorGrad)" stroke-width="5" stroke-linejoin="round" />
    <!-- Screen Base -->
    <line x1="30" y1="115" x2="110" y2="115" stroke="url(#monitorGrad)" stroke-width="6" stroke-linecap="round" />
    
    <!-- Chart / score bars inside screen -->
    <!-- Left bar (Merah) -->
    <rect x="25" y="45" width="20" height="40" rx="3" fill="#ef4444" opacity="0.8" />
    <!-- Right bar (Biru) -->
    <rect x="55" y="30" width="20" height="55" rx="3" fill="#3b82f6" opacity="0.8" />
    <!-- Live wave/line indicator -->
    <path d="M 20 25 L 50 35 L 80 20 L 110 40" fill="none" stroke="url(#monitorGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
